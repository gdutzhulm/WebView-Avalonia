name: Build and Pack NuGet

on:
  push:
    branches: [ main, master, ai-mac-fix ]
  pull_request:
    branches: [ main, master, ai-mac-fix ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'ReleaseAvalonia'
        type: choice
        options:
          - ReleaseAvalonia
          - Debug

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'WebView/WebViewControl.Avalonia/WebViewControl.Avalonia.csproj'

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            platform: ARM64
          # macOS x64 (Intel)
          - os: macos-13
            platform: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build project
        shell: bash
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            -c ReleaseAvalonia \
            /p:Platform=${{ matrix.platform }}

      - name: Pack NuGet package
        shell: bash
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            -c ReleaseAvalonia \
            --no-build \
            --output ./nupkgs \
            /p:Platform=${{ matrix.platform }}

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ matrix.os }}-${{ matrix.platform }}
          path: nupkgs/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: build-and-pack
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
