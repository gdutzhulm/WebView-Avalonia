name: Build and Pack NuGet

on:
  push:
    branches: [ main, master, ai-mac-fix, test-upgrade-cef ]
  pull_request:
    branches: [ main, master, ai-mac-fix, test-upgrade-cef ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'ReleaseAvalonia'
        type: choice
        options:
          - ReleaseAvalonia
          - Debug

env:
  DOTNET_VERSION: '8.0.x'
  CEFGLUE_REPOSITORY: 'https://github.com/OutSystems/CefGlue.git'
  CEFGLUE_BRANCH: 'RDEV-8412-bump-cef-to-134.3.9'
  CEFGLUE_VERSION: '134.6998.178'
  WEBVIEW_VERSION: '3.134.178-macos'
  AVALONIA_PROJECT_PATH: 'WebView/WebViewControl.Avalonia/WebViewControl.Avalonia.csproj'
  WPF_PROJECT_PATH: 'WebView/WebViewControl/WebViewControl.csproj'

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            platform: ARM64
          # macOS x64 (Intel)
          - os: macos-13
            platform: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build local CefGlue packages
        shell: bash
        run: |
          git clone --depth 1 --branch "$CEFGLUE_BRANCH" "$CEFGLUE_REPOSITORY" ../CefGlue-134
          dotnet build ../CefGlue-134/CefGlue.Avalonia/CefGlue.Avalonia.csproj \
            -c Release \
            /p:Platform=${{ matrix.platform }}
          dotnet build ../CefGlue-134/CefGlue.WPF/CefGlue.WPF.csproj \
            -c Release \
            /p:Platform=${{ matrix.platform }}
          mkdir -p local-nuget
          cp ../CefGlue-134/Nuget/output/*.${CEFGLUE_VERSION}.nupkg local-nuget/

      - name: Build WebView packages
        shell: bash
        run: |
          dotnet build ${{ env.AVALONIA_PROJECT_PATH }} \
            -c ReleaseAvalonia \
            /p:Platform=${{ matrix.platform }}
          dotnet build ${{ env.WPF_PROJECT_PATH }} \
            -c ReleaseWPF \
            /p:Platform=${{ matrix.platform }} \
            /p:EnableWindowsTargeting=true

      - name: Collect NuGet packages
        shell: bash
        run: |
          mkdir -p nupkgs
          cp WebView/nuget/*.${WEBVIEW_VERSION}.nupkg nupkgs/

      - name: Upload WebView NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webview-nupkgs-${{ matrix.os }}-${{ matrix.platform }}
          path: nupkgs/*.nupkg
          retention-days: 30

      - name: Upload local CefGlue NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cefglue-nupkgs-${{ matrix.os }}-${{ matrix.platform }}
          path: local-nuget/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: build-and-pack
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: webview-nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/WebViewControl-*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
